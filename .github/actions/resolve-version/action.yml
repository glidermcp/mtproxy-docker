name: Resolve mtg Version
description: Resolve the pinned mtg version and repo commit

outputs:
  repo_commit:
    description: Repo short commit hash
    value: ${{ steps.resolve.outputs.repo_commit }}
  upstream_version:
    description: Pinned mtg version from docker/Dockerfile
    value: ${{ steps.resolve.outputs.upstream_version }}
  image_tag:
    description: Published image tag for the pinned mtg release and repo revision
    value: ${{ steps.resolve.outputs.image_tag }}

runs:
  using: composite
  steps:
    - name: Resolve version and commit
      id: resolve
      shell: bash
      run: |
        set -euo pipefail

        repo_commit="$(git rev-parse --short=12 HEAD)"
        upstream_version="$(
          awk -F= '/^ARG MTG_VERSION=/ { print $2; exit }' docker/Dockerfile
        )"
        image_tag="repo-${repo_commit}-mtg-${upstream_version}"

        {
          echo "repo_commit=$repo_commit"
          echo "upstream_version=$upstream_version"
          echo "image_tag=$image_tag"
        } >> "$GITHUB_OUTPUT"
