name: Resolve MTProxy Upstream
description: Resolve the MTProxy version and commit

outputs:
  repo_commit:
    description: Repo short commit hash
    value: ${{ steps.resolve.outputs.repo_commit }}
  upstream_commit:
    description: Upstream short commit hash
    value: ${{ steps.resolve.outputs.upstream_commit }}
  image_tag:
    description: Published image tag for the latest upstream revision and repo revision
    value: ${{ steps.resolve.outputs.image_tag }}

runs:
  using: composite
  steps:
    - name: Resolve version and commit
      id: resolve
      shell: bash
      run: |
        set -euo pipefail

        repo_dir="$(mktemp -d)"
        trap 'rm -rf "$repo_dir"' EXIT

        git clone --depth 1 --filter=blob:none https://github.com/TelegramMessenger/MTProxy.git "$repo_dir"

        repo_commit="$(git rev-parse --short=12 HEAD)"
        upstream_commit="$(git -C "$repo_dir" rev-parse --short=12 HEAD)"
        image_tag="repo-${repo_commit}-upstream-${upstream_commit}"

        {
          echo "repo_commit=$repo_commit"
          echo "upstream_commit=$upstream_commit"
          echo "image_tag=$image_tag"
        } >> "$GITHUB_OUTPUT"
